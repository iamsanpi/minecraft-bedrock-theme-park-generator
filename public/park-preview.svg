<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">月亮基地主题乐园俯视示意图</title>
  <desc id="desc">展示入口大门、中央火箭广场、双人总部、激光迷宫、跳跳陨石坑、水晶洞、月球车道和最终发射区的相对位置。</desc>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#cbd5e1" stroke-width="2"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.22"/>
    </filter>
    <linearGradient id="moonGround" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#dbeafe"/>
    </linearGradient>
    <linearGradient id="rocket" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#fef2f2"/>
      <stop offset="1" stop-color="#e0f2fe"/>
    </linearGradient>
    <style>
      .label { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-weight: 800; fill: #0f172a; letter-spacing: 0; }
      .small { font-size: 24px; font-weight: 700; fill: #334155; }
      .title { font-size: 48px; font-weight: 900; }
      .zone-title { font-size: 30px; }
      .route { fill: none; stroke: #2563eb; stroke-width: 18; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 26 20; opacity: 0.9; }
      .road { fill: #38bdf8; stroke: #0f172a; stroke-width: 6; }
      .zone { stroke: #0f172a; stroke-width: 6; rx: 22; filter: url(#shadow); }
      .pixel { shape-rendering: crispEdges; }
    </style>
  </defs>

  <rect width="1600" height="1000" fill="#eef6ff"/>
  <rect x="80" y="90" width="1440" height="820" rx="28" fill="url(#moonGround)" stroke="#0f172a" stroke-width="10"/>
  <rect x="100" y="110" width="1400" height="780" rx="18" fill="url(#grid)" opacity="0.8"/>

  <text x="100" y="62" class="label title">月亮基地主题乐园 - 生成后俯视预览</text>
  <text x="1010" y="62" class="label small">进游戏运行：/function build</text>

  <!-- main roads -->
  <rect x="750" y="145" width="100" height="700" class="road"/>
  <rect x="160" y="455" width="1280" height="100" class="road"/>
  <circle cx="800" cy="505" r="130" fill="#e0f2fe" stroke="#0f172a" stroke-width="8"/>
  <circle cx="800" cy="505" r="92" fill="#ffffff" stroke="#38bdf8" stroke-width="14"/>

  <!-- route arrow -->
  <path class="route" d="M800 850 C800 735 800 650 800 545 C640 520 520 430 420 320 C570 250 680 330 800 505 C940 420 1080 320 1210 300 C1190 470 1020 520 800 505 C685 660 540 700 420 690 C520 780 655 760 800 505 C1000 610 1125 720 1250 730 C1100 795 950 720 800 505 C800 600 800 705 800 810"/>

  <!-- entrance -->
  <rect x="560" y="810" width="480" height="85" rx="18" fill="#111827" stroke="#0f172a" stroke-width="8" filter="url(#shadow)"/>
  <rect x="600" y="745" width="75" height="150" rx="10" fill="#f8fafc" stroke="#0f172a" stroke-width="6"/>
  <rect x="925" y="745" width="75" height="150" rx="10" fill="#f8fafc" stroke="#0f172a" stroke-width="6"/>
  <rect x="600" y="735" width="400" height="60" rx="10" fill="#f8fafc" stroke="#0f172a" stroke-width="6"/>
  <text x="662" y="777" class="label zone-title">MOON PARK</text>
  <text x="640" y="852" class="label small" fill="#ffffff">入口大门</text>

  <!-- central rocket -->
  <g filter="url(#shadow)">
    <ellipse cx="800" cy="505" rx="44" ry="86" fill="url(#rocket)" stroke="#0f172a" stroke-width="6"/>
    <polygon points="800,330 752,444 848,444" fill="#ef4444" stroke="#0f172a" stroke-width="6"/>
    <polygon points="756,552 700,610 774,584" fill="#22c55e" stroke="#0f172a" stroke-width="6"/>
    <polygon points="844,552 900,610 826,584" fill="#22c55e" stroke="#0f172a" stroke-width="6"/>
    <circle cx="800" cy="468" r="24" fill="#38bdf8" stroke="#0f172a" stroke-width="5"/>
    <path d="M770 590 L830 590 L800 665 Z" fill="#f97316" stroke="#0f172a" stroke-width="5"/>
  </g>
  <text x="704" y="640" class="label zone-title">中央火箭广场</text>

  <!-- top final launch -->
  <rect x="625" y="125" width="350" height="190" rx="22" fill="#ffffff" class="zone"/>
  <rect x="690" y="170" width="220" height="80" rx="12" fill="#fef3c7" stroke="#0f172a" stroke-width="5"/>
  <polygon points="800,145 760,225 840,225" fill="#ef4444" stroke="#0f172a" stroke-width="5"/>
  <text x="686" y="285" class="label zone-title">最终火箭发射区</text>

  <!-- NW crater jump -->
  <rect x="145" y="145" width="440" height="250" rx="22" fill="#dbeafe" class="zone"/>
  <circle cx="300" cy="270" r="82" fill="#94a3b8" stroke="#0f172a" stroke-width="6"/>
  <circle cx="300" cy="270" r="48" fill="#64748b"/>
  <rect x="410" y="310" width="46" height="30" fill="#22c55e" stroke="#0f172a" stroke-width="4" class="pixel"/>
  <rect x="470" y="260" width="46" height="30" fill="#06b6d4" stroke="#0f172a" stroke-width="4" class="pixel"/>
  <rect x="525" y="210" width="46" height="30" fill="#facc15" stroke="#0f172a" stroke-width="4" class="pixel"/>
  <text x="205" y="185" class="label zone-title">跳跳陨石坑</text>
  <text x="210" y="372" class="label small">低难度 parkour，下面是安全垫</text>

  <!-- NE laser maze -->
  <rect x="1015" y="145" width="440" height="250" rx="22" fill="#fee2e2" class="zone"/>
  <path d="M1060 205 H1400 M1060 260 H1400 M1060 315 H1400" stroke="#ef4444" stroke-width="11" stroke-linecap="round"/>
  <path d="M1090 185 V355 M1180 185 V300 M1270 225 V375 M1360 185 V330" stroke="#111827" stroke-width="18" stroke-linecap="round"/>
  <rect x="1375" y="330" width="48" height="38" rx="6" fill="#22c55e" stroke="#0f172a" stroke-width="5"/>
  <text x="1120" y="185" class="label zone-title">激光迷宫</text>
  <text x="1082" y="372" class="label small">走到绿宝石出口，不碰红线</text>

  <!-- west/east HQ -->
  <rect x="145" y="430" width="330" height="160" rx="22" fill="#bfdbfe" class="zone"/>
  <rect x="1125" y="430" width="330" height="160" rx="22" fill="#bbf7d0" class="zone"/>
  <rect x="195" y="478" width="80" height="70" fill="#2563eb" stroke="#0f172a" stroke-width="5"/>
  <polygon points="235,430 175,482 295,482" fill="#60a5fa" stroke="#0f172a" stroke-width="5"/>
  <rect x="1175" y="478" width="80" height="70" fill="#22c55e" stroke="#0f172a" stroke-width="5"/>
  <polygon points="1215,430 1155,482 1275,482" fill="#86efac" stroke="#0f172a" stroke-width="5"/>
  <text x="300" y="500" class="label zone-title">蓝队总部</text>
  <text x="1280" y="500" class="label zone-title">绿队总部</text>
  <text x="250" y="555" class="label small">双人合作基地</text>
  <text x="1230" y="555" class="label small">休息和领奖</text>

  <!-- SW crystal cave -->
  <rect x="145" y="640" width="440" height="230" rx="22" fill="#f3e8ff" class="zone"/>
  <path d="M180 835 C240 720 340 690 415 760 C475 690 545 735 560 835 Z" fill="#1e1b4b" stroke="#0f172a" stroke-width="6"/>
  <polygon points="265,805 300,695 335,805" fill="#a855f7" stroke="#0f172a" stroke-width="5"/>
  <polygon points="390,820 430,710 470,820" fill="#c084fc" stroke="#0f172a" stroke-width="5"/>
  <text x="235" y="690" class="label zone-title">水晶洞</text>
  <text x="210" y="858" class="label small" fill="#ffffff">找紫色水晶路</text>

  <!-- SE rover speedway -->
  <rect x="1015" y="640" width="440" height="230" rx="22" fill="#dcfce7" class="zone"/>
  <rect x="1060" y="685" width="350" height="140" rx="55" fill="none" stroke="#111827" stroke-width="24"/>
  <rect x="1090" y="715" width="290" height="80" rx="36" fill="none" stroke="#94a3b8" stroke-width="18"/>
  <circle cx="1160" cy="755" r="22" fill="#facc15" stroke="#0f172a" stroke-width="5"/>
  <rect x="1140" y="730" width="58" height="32" rx="8" fill="#ef4444" stroke="#0f172a" stroke-width="5"/>
  <text x="1118" y="690" class="label zone-title">月球车道</text>
  <text x="1110" y="858" class="label small">矿车绕场一圈</text>

  <!-- legend -->
  <rect x="106" y="920" width="1388" height="54" rx="12" fill="#ffffff" stroke="#0f172a" stroke-width="4"/>
  <text x="130" y="955" class="label small">玩法路线：入口 → 中央火箭 → 跳跳陨石坑 → 激光迷宫 → 水晶洞 → 月球车道 → 最终发射区</text>
</svg>
